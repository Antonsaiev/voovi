services:
  db:
    image: mariadb:10.2
    container_name: voovi_db
    restart: unless-stopped
    env_file:
      - ./configs/env/local.env
    command:
      - --character-set-server=utf8
      - --collation-server=utf8_general_ci
      - --sql-mode=
    ports:
      - "${MYSQL_PORT:-3308}:3306"
    volumes:
      - voovi_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "sh", "-c", "mysqladmin ping -h localhost -u root -p\"$$MYSQL_ROOT_PASSWORD\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      voovi:
        aliases:
          - mysql

  db-restore:
    image: mariadb:10.2
    container_name: voovi_db_restore
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./configs/env/local.env
    volumes:
      - type: bind
        source: ./voovi.sql
        target: /dump/voovi.sql
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./docker/db/restore-db.sh
        target: /usr/local/bin/restore-db.sh
        read_only: true
        bind:
          create_host_path: false
    entrypoint: ["/bin/sh", "/usr/local/bin/restore-db.sh"]
    networks:
      - voovi

  voovi-web:
    build:
      context: ./voovi.ru
      dockerfile: Dockerfile
    platform: linux/amd64
    container_name: voovi_web
    restart: unless-stopped
    depends_on:
      db-restore:
        condition: service_completed_successfully
    env_file:
      - ./configs/env/local.env
    ports:
      - "${VOOVI_WEB_PORT:-8080}:80"
    volumes:
      - ./voovi.ru:/var/www/html
      - ./voovi.ru/docker/conf.php:/var/www/html/conf.php:ro
      - ./voovi.ru/docker/.htaccess:/var/www/html/.htaccess:ro
    networks:
      voovi:
        aliases:
          - voovi.ru

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: voovi_phpmyadmin
    restart: unless-stopped
    depends_on:
      db-restore:
        condition: service_completed_successfully
    env_file:
      - ./configs/env/local.env
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    networks:
      - voovi

  nginx:
    image: nginx:1.27-alpine
    container_name: voovi_nginx
    restart: unless-stopped
    depends_on:
      voovi-web:
        condition: service_started
      svoovi-api:
        condition: service_started
      analitic:
        condition: service_started
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./configs/nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - voovi

  svoovi-api:
    build:
      context: ./s.voovi.ru-api
      dockerfile: Dockerfile
    container_name: apisvoovi
    hostname: apisvoovi
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    depends_on:
      db-restore:
        condition: service_completed_successfully
    env_file:
      - ./configs/env/local.env
    ports:
      - "${SVOOVI_API_PORT:-7005}:8000"
    volumes:
      - ./s.voovi.ru-api:/usr/src/app
    networks:
      voovi:
        aliases:
          - s.voovi.ru

  svoovi-api-tasks:
    build:
      context: ./s.voovi.ru-api
      dockerfile: Dockerfile
    container_name: apisvoovi_tasks
    hostname: apisvoovi_tasks
    restart: unless-stopped
    command: python manage.py process_tasks
    depends_on:
      db-restore:
        condition: service_completed_successfully
      svoovi-api:
        condition: service_started
    env_file:
      - ./configs/env/local.env
    volumes:
      - ./s.voovi.ru-api:/usr/src/app
    networks:
      - voovi

  analitic:
    build:
      context: ./analitic
      dockerfile: Dockerfile
    container_name: analitic
    hostname: analitic
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:7000 --insecure
    depends_on:
      db-restore:
        condition: service_completed_successfully
      svoovi-api:
        condition: service_started
    env_file:
      - ./configs/env/local.env
    ports:
      - "${ANALITIC_PORT:-7000}:7000"
    volumes:
      - ./analitic:/code
    networks:
      - voovi

networks:
  voovi:
    name: voovi

volumes:
  voovi_mysql:
